# Config for KataGo C++ Analysis engine, optimized for RTX Desktop GPU environments.
# To be used with CUDA or TensorRT builds of KataGo ("./katago.exe analysis")

# Logs
logDir = analysis_logs
logToStderr = false

# Report winrates for analysis as (BLACK|WHITE|SIDETOMOVE).
reportAnalysisWinratesAs = BLACK

# Search threads, batching, GPUs ---------------------------------------------------------
# RTX 3080, 4070 등 최신 데스크탑 GPU를 위해 튜닝된 값입니다.
# 다수의 클라이언트 요청을 한 번에 병렬 처리하여 대역폭(Throughput)을 높입니다.
numAnalysisThreads = 32
numSearchThreadsPerAnalysisThread = 8

# nnMaxBatchSize는 단일 GPU로 보낼 최대 포지션 수입니다. 
# (일반적인 공식: nnMaxBatchSize >= numAnalysisThreads * numSearchThreadsPerAnalysisThread)
# VRAM(예: 8GB)이 부족하여 모델 3개를 올릴 때 OOM이 발생한다면 이 값을 128 혹은 64로 줄이세요.
nnMaxBatchSize = 256

# VRAM 절약 (분석용으로만 사용 시)
# requireMaxBoardSize = true
maxBoardXSizeForNNBuffer = 19
maxBoardYSizeForNNBuffer = 19

# Cache / Mutex (메모리 사용 관련)
# VRAM/시스템 메모리를 많이 잡지 않도록 조절된 값. OOM 방지용으로 약간 보수적 세팅을 유지합니다.
nnCacheSizePowerOfTwo = 22
nnMutexPoolSizePowerOfTwo = 16
nnRandomize = true

# CUDA & TensorRT Settings -------------------------------------------------------------
# RTX GPU의 디바이스 ID(주로 0)를 지정합니다.
cudaDeviceToUse = 0
trtDeviceToUse = 0

# RTX 카드에서는 혼합 정밀도(FP16) 연산이 반드시 활성화되어야 엄청난 가속을 얻습니다.
# "auto"로 두면 KataGo가 알아서 켭니다.
cudaUseFP16 = auto
cudaUseNHWC = auto

# Search limits
# 요청 시 maxVisits를 주입하지 않은 경우의 글로벌 한도치입니다.
maxVisits = 500

# Misc Behavior ------------------------------------------------------------------------
# 꼼수 방지 및 사람 친화적 플레이 등 (분석 결과 퀄리티 보정)
conservativePass = true
preventCleanupPhase = true
useGraphSearch = true
useNoisePruning = true

cpuctExploration = 1.0
cpuctExplorationLog = 0.45
rootPolicyOptimism = 0.2
policyOptimism = 1.0
